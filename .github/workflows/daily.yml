name: Daily Online Schools Registry

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python scripts/collect.py
          python scripts/enrich.py
          python scripts/classify.py

      - name: Export to Google Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python scripts/export_to_sheets.py

      - name: Commit outputs
        run: |
          git config user.name "registry-bot"
          git config user.email "registry-bot@users.noreply.github.com"
          git add data/*.csv
          git commit -m "daily update" || echo "No changes"
          git push
