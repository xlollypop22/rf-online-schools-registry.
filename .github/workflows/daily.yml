name: Daily Online Schools Registry

on:
  schedule:
    # 09:00 Buenos Aires (UTC-3) = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify gspread installation
        run: |
          python -c "import gspread; print('gspread OK')"

      - name: Run pipeline
        run: |
          python scripts/collect.py
          python scripts/enrich.py
          python scripts/classify.py

      - name: Debug CSV before export
        run: |
          echo "=== Listing data folder ==="
          ls -lah data || true
          echo "=== Preview registry_final.csv ==="
          head -n 5 data/registry_final.csv || true

      - name: Export to Google Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python scripts/export_to_sheets.py

      - name: Commit CSV outputs
        run: |
          git config user.name "registry-bot"
          git config user.email "registry-bot@users.noreply.github.com"
          git add data/*.csv
          git commit -m "daily update" || echo "No changes"
          git push
